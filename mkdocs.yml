      - Use libft in another project: how-to/use-libft-in-another-project.md
  - Explainations:
      - Memory Ownership: explanation/memory-ownership.md
  - Reference:
      - Function reference: reference/functions.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true